# 环境配置
springdoc:
  paths-to-match: /api/**
  swagger-ui:
    operations-sorter: alpha
spring:
  mail:
    host: smtp.163.com
    username: xxxx@163.com
    password: xxxxxx
  rabbitmq:
    addresses: localhost
    username: guest
    password: 123456
    virtual-host: /
    listener:
      simple:
        auto-startup: false
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
  elasticsearch:
    uris: localhost:9200
    username: elastic
    password: 123456
  datasource:
    url: jdbc:mysql://localhost:3306/study
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  security:
    jwt:
      key: 'abcdefghijklmn'
      expire: 72
      limit:
        base: 10
        upgrade: 300
        frequency: 30
    filter:
      order: -100
  web:
    verify:
      mail-limit: 60
    flow:
      period: 3
      limit: 50
      block: 30
    cors:
      origin: '*'
      credentials: false
      methods: '*'
  minio:
    endpoint: 'http://localhost:9000'
    username: 'minio'
    password: 'password'
  weather:
    api-host: 'kv487n5dxd.re.qweatherapi.com'
    key: xxxxxxxx
  ai:
    deepseek:
      api-key: 'xxxxxxxx'
      base-url: 'xxxxxxxx'
